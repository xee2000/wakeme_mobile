name: Build & Deploy to Google Play

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      track:
        description: 'л°°нҸ¬ нҠёлһҷ'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: мҪ”л“ң мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v4

      - name: JDK 17 м„Өм •
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Node.js м„Өм •
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm нҢЁнӮӨм§Җ м„Өм№ҳ
        run: npm ci

      - name: Gradle мәҗмӢң
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: нӮӨмҠӨнҶ м–ҙ нҢҢмқј ліөмӣҗ
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/wakeme.jks

      - name: local.properties мғқм„ұ
        run: |
          cat > android/local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          WAKEME_STORE_FILE=wakeme.jks
          WAKEME_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}
          WAKEME_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          WAKEME_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
          EOF

      - name: versionCode мһҗлҸҷ мҰқк°Җ (run number кё°л°ҳ)
        run: |
          # GitHub Actions run numberлҘј versionCodeлЎң мӮ¬мҡ© (лӢЁмЎ° мҰқк°Җ ліҙмһҘ)
          VERSION_CODE=$((100 + ${{ github.run_number }}))
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" android/app/build.gradle
          echo "versionCode: $VERSION_CODE"

      - name: AAB л№Ңл“ң (Release)
        run: |
          cd android && ./gradlew bundleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Google Play м—…лЎңл“ң
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.wakeme_mobile
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          whatsNewDirectory: .github/whatsnew

      - name: л№Ңл“ң кІ°кіј м•ҢлҰј
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "вң… л°°нҸ¬ м„ұкіө: ${{ github.event.inputs.track || 'internal' }} нҠёлһҷ"
          else
            echo "вқҢ л°°нҸ¬ мӢӨнҢЁ"
          fi
